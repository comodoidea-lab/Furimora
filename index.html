<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>フリモーラ - Web Preview</title>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        /* Mobile Frame for Desktop */
        @media (min-width: 640px) {
            .mobile-frame {
                width: 390px;
                height: 844px;
                border: 8px solid #1f2937;
                border-radius: 40px;
                position: relative;
                margin: 20px auto;
                overflow: hidden;
            }
        }
    </style>
</head>
<body class="bg-gray-200 flex justify-center items-start sm:items-center min-h-screen">

    <div id="root" class="mobile-frame w-full h-screen sm:h-auto bg-gray-50 shadow-2xl overflow-hidden flex flex-col"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Lucide Icon Wrapper
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('calc');
            const [calcSubTab, setCalcSubTab] = useState('calculator');
            const [historySubTab, setHistorySubTab] = useState('list');
            
            // State
            const [price, setPrice] = useState(0);
            const [cost, setCost] = useState(0);
            const [feePercent, setFeePercent] = useState(10);
            const [shipping, setShipping] = useState(239);

            const profit = useMemo(() => {
                const fee = Math.floor(price * (feePercent / 100));
                return price - cost - fee - shipping;
            }, [price, cost, feePercent, shipping]);

            const profitRate = useMemo(() => {
                if (price <= 0) return 0;
                return ((profit / price) * 100).toFixed(1);
            }, [profit, price]);

            const renderTabButton = (id, iconName, label) => (
                <button 
                    onClick={() => setActiveTab(id)}
                    className={`flex flex-col items-center justify-center flex-1 py-2 ${activeTab === id ? 'text-blue-500' : 'text-gray-400'}`}
                >
                    <Icon name={iconName} size={20} />
                    <span className="text-[10px] mt-1 font-bold">{label}</span>
                </button>
            );

            return (
                <div className="flex flex-col h-full bg-gray-50 relative">
                    {/* Status Bar Mock */}
                    <div className="h-10 flex justify-between items-center px-8 pt-4 shrink-0">
                        <span className="text-xs font-black">9:41</span>
                        <div className="flex gap-1 text-xs"><span>📶</span><span>🔋</span></div>
                    </div>

                    {/* Scrollable Content */}
                    <div className="flex-1 overflow-y-auto px-5 pt-4 pb-24">
                        
                        {/* CALCULATOR */}
                        {activeTab === 'calc' && (
                            <div className="animate-in fade-in duration-300">
                                <div className="flex bg-gray-200 rounded-lg p-1 mb-6">
                                    <button onClick={() => setCalcSubTab('calculator')} className={`flex-1 py-2 text-sm font-black rounded-md ${calcSubTab === 'calculator' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>計算</button>
                                    <button onClick={() => setCalcSubTab('research')} className={`flex-1 py-2 text-sm font-black rounded-md ${calcSubTab === 'research' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>リサーチ</button>
                                </div>
                                
                                {calcSubTab === 'calculator' ? (
                                    <div className="space-y-4">
                                        <h1 className="text-xl font-black text-center mb-6 text-gray-800">利益計算機</h1>
                                        <div className="flex gap-2">
                                            <input className="w-1/2 p-3 rounded-xl border border-gray-200 bg-white" placeholder="仕入れ店舗名" />
                                            <input className="w-1/2 p-3 rounded-xl border border-gray-200 bg-white" placeholder="商品名" />
                                        </div>
                                        <div className="flex gap-2">
                                            <div className="w-1/2">
                                                <label className="text-[10px] text-gray-400 font-bold ml-1">販売価格</label>
                                                <input type="number" value={price || ''} onChange={(e) => setPrice(Number(e.target.value))} className="w-full p-3 rounded-xl border border-gray-200" placeholder="0" />
                                            </div>
                                            <div className="w-1/2">
                                                <label className="text-[10px] text-red-500 font-bold ml-1">販売先</label>
                                                <select value={feePercent} onChange={(e) => setFeePercent(Number(e.target.value))} className="w-full p-3 rounded-xl border border-gray-200 bg-white">
                                                    <option value={10}>メルカリ (10%)</option>
                                                    <option value={5}>ヤフオク (5%)</option>
                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex justify-around items-center text-center mt-6">
                                            <div>
                                                <p className="text-[10px] font-bold text-gray-400 uppercase">利益額</p>
                                                <p className={`text-3xl font-black ${profit < 0 ? 'text-red-500' : 'text-gray-800'}`}>¥{profit.toLocaleString()}</p>
                                            </div>
                                            <div className="w-px h-10 bg-gray-100"></div>
                                            <div>
                                                <p className="text-[10px] font-bold text-gray-400 uppercase">利益率</p>
                                                <p className="text-3xl font-black text-red-500">{profitRate}%</p>
                                            </div>
                                        </div>
                                        
                                        <button className="w-full bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 mt-4 active:scale-95 transition-transform">
                                            データベースに保存
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <div className="h-40 bg-gray-200 rounded-[2rem] border-2 border-dashed border-gray-300 flex flex-col items-center justify-center text-gray-500">
                                            <Icon name="barcode" size={48} />
                                            <p className="text-sm mt-2 font-black">バーコードをスキャン</p>
                                        </div>
                                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                            <p className="text-sm font-black mb-3 flex items-center gap-2"><Icon name="trending-up" size={16} className="text-blue-500"/> Keepa 統計</p>
                                            <div className="h-20 flex items-end gap-1 px-2">
                                                {[30, 60, 45, 90, 70, 40, 85].map((h, i) => (
                                                    <div key={i} className="flex-1 bg-blue-100 rounded-t-sm" style={{ height: `${h}%` }}></div>
                                                ))}
                                            </div>
                                        </div>
                                        <button className="w-full bg-white p-4 rounded-xl border border-gray-200 flex items-center gap-3 font-bold text-sm shadow-sm">
                                            <Icon name="external-link" size={18} className="text-red-500" /> メルカリで検索
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* HISTORY */}
                        {activeTab === 'history' && (
                            <div className="animate-in fade-in duration-300">
                                <div className="flex bg-gray-200 rounded-lg p-1 mb-6">
                                    <button onClick={() => setHistorySubTab('list')} className={`flex-1 py-2 text-sm font-black rounded-md ${historySubTab === 'list' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>履歴</button>
                                    <button onClick={() => setHistorySubTab('analysis')} className={`flex-1 py-2 text-sm font-black rounded-md ${historySubTab === 'analysis' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>分析</button>
                                </div>
                                {historySubTab === 'list' ? (
                                    <div className="space-y-4">
                                        <div className="bg-blue-600 p-6 rounded-[2rem] text-white shadow-xl shadow-blue-100">
                                            <p className="text-xs opacity-80 font-bold">本日の合計利益</p>
                                            <h2 className="text-4xl font-black mt-1">¥4,793</h2>
                                        </div>
                                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                            <div className="flex justify-between">
                                                <h3 className="font-black text-sm">しげちーの大冒険 [DVD]</h3>
                                                <span className="text-[10px] text-gray-400">18:13</span>
                                            </div>
                                            <p className="text-xs text-red-500 font-black mt-2">利益: ¥578 (38.1%)</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                                        <h3 className="font-black text-sm mb-4">月次利益推移</h3>
                                        <div className="h-40 flex items-end gap-2 border-b border-gray-100 px-2">
                                            {[40, 70, 55, 95, 80].map((h, i) => (
                                                <div key={i} className="flex-1 bg-green-500 rounded-t-lg" style={{ height: `${h}%` }}></div>
                                            ))}
                                        </div>
                                        <div className="mt-6 flex justify-around">
                                            <div className="text-center"><p className="text-[10px] text-gray-400 font-bold">平均利益率</p><p className="text-xl font-black">32.1%</p></div>
                                            <div className="text-center"><p className="text-[10px] text-gray-400 font-bold">売上合計</p><p className="text-xl font-black">¥42,800</p></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'inventory' && <div className="text-center py-20 font-black text-gray-300">在庫管理（構築中）</div>}
                        {activeTab === 'settings' && <div className="text-center py-20 font-black text-gray-300">設定（構築中）</div>}

                    </div>

                    {/* Tab Bar */}
                    <div className="absolute bottom-0 left-0 right-0 h-20 bg-white/90 backdrop-blur-md border-t border-gray-100 flex items-center px-4 pb-4 shrink-0">
                        {renderTabButton('calc', 'calculator', '計算')}
                        {renderTabButton('history', 'history', '履歴')}
                        {renderTabButton('inventory', 'package', '在庫')}
                        {renderTabButton('settings', 'settings', '設定')}
                    </div>
                    
                    {/* Home Indicator */}
                    <div className="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-gray-200 rounded-full"></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
