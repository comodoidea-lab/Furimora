        /* ── Dark mode overrides ── */
        html.dark body { background-color: #0f1117; }
        html.dark .bg-white    { background-color: #1e2330 !important; }
        html.dark .bg-gray-50  { background-color: #0f1117 !important; }
        html.dark .bg-gray-100 { background-color: #1e2330 !important; }
        html.dark .bg-gray-200 { background-color: #2a3142 !important; }
        html.dark .text-gray-800 { color: #f1f5f9 !important; }
        html.dark .text-gray-700 { color: #e2e8f0 !important; }

        html.dark select,

        html.dark .shadow-xl,
        html.dark .shadow-2xl   { box-shadow: 0 4px 16px 0 rgba(0,0,0,0.5) !important; }
        html.dark [class*="shadow-blue"],
        html.dark [class*="shadow-green"],
        html.dark [class*="shadow-purple"] { box-shadow: none !important; }

<body class="bg-gray-100 flex justify-center items-start min-h-dvh">
<div id="root" class="w-full max-w-4xl min-h-dvh bg-white shadow-sm flex flex-col relative mx-auto"></div>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

// ─── GAS endpoint ────────────────────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbzIApMS04CP_RGrQZUKRFK4sbi24j_OCZxm6K8Vp-ka376QgZJnsDRMINKiwtsO1Ltn/exec";

// ─── Default master data ──────────────────────────────────────────────────────
const DEFAULT_SHIPPING = [
    { id: 1, name: 'ネコポス',          fee: 210, packing: 29, isDefault: true  },
    { id: 2, name: 'ゆうパケットポスト', fee: 215, packing: 35, isDefault: false },
    { id: 3, name: 'ゆうパケットプラス', fee: 455, packing: 65, isDefault: false },
    { id: 4, name: '宅急便コンパクト',   fee: 450, packing: 70, isDefault: false },
    { id: 5, name: 'ゆうパック60',      fee: 660, packing: 0,  isDefault: false },
];
const DEFAULT_PLATFORMS = [
    { id: 1, name: 'メルカリ', fee: 10,  isDefault: true  },
    { id: 2, name: 'ラクマ',   fee: 8.8, isDefault: false },
    { id: 3, name: 'ヤフオク', fee: 5,   isDefault: false },
    { id: 4, name: 'Amazon',   fee: 15,  isDefault: false },
];

const STATUSES = ['評価待ち', '出品前', '出品中', '入金待ち', '発送待ち', '取引完了', 'その他'];
const STATUS_COLORS = {
    '評価待ち': 'bg-yellow-100 text-yellow-700',
    '出品前':   'bg-blue-100 text-blue-700',
    '出品中':   'bg-green-100 text-green-700',
    '入金待ち': 'bg-orange-100 text-orange-700',
    '発送待ち': 'bg-purple-100 text-purple-700',
    '取引完了': 'bg-gray-100 text-gray-500',
    'その他':   'bg-gray-100 text-gray-400',
};

// ─── Lucide icon wrapper ──────────────────────────────────────────────────────
const Icon = ({ name, size = 20, className = "" }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (window.lucide && ref.current)
            window.lucide.createIcons({ attrs: { 'stroke-width': 2 }, nameAttr: 'data-lucide' });
    }, [name]);
    return (
        <span className={`inline-flex items-center justify-center ${className}`} ref={ref}>
            <i data-lucide={name} style={{ width: size, height: size }} />
        </span>
    );
};

// ─── Toast notification ───────────────────────────────────────────────────────
const Toast = ({ message, type, onClose }) => {
    useEffect(() => { const t = setTimeout(onClose, 2600); return () => clearTimeout(t); }, []);
    const bg = type === 'success' ? 'bg-green-500' : 'bg-red-500';
    const icon = type === 'success' ? 'check-circle' : 'alert-circle';
    return (
        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[999] px-5 py-3 rounded-2xl shadow-xl text-sm font-black text-white slide-down flex items-center gap-2 ${bg}`}>
            <Icon name={icon} size={16} />{message}
        </div>
    );
};

// ─── Toggle switch ────────────────────────────────────────────────────────────
const Toggle = ({ checked, onChange }) => (
    <button onClick={() => onChange(!checked)}
        className={`relative w-12 h-6 rounded-full transition-colors duration-200 focus:outline-none ${checked ? 'bg-blue-500' : 'bg-gray-300'}`}>
        <span className={`absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform duration-200 ${checked ? 'translate-x-6' : 'translate-x-0'}`} />
    </button>
);

// ─── localStorage helpers ─────────────────────────────────────────────────────
const ls = {
    get: (k, def) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } },
    set: (k, v)   => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ─── Date formatter ───────────────────────────────────────────────────────────
const formatDate = (dateStr) => {
    if (!dateStr) return '';
    const s = String(dateStr);
    const d = new Date(s.replace(/\//g, '-').split(' ')[0]);
    if (isNaN(d)) return s.split('T')[0];
    return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
};

// ─── Unified Item Edit Modal (履歴 / ストック / 在庫 共通) ────────────────────
const UnifiedEditModal = ({ title, item, onSave, onClose, platforms, shippingMethods, showMemo = false }) => {
    const defPlat = platforms.find(p => p.isDefault) || platforms[0] || { fee: 10 };
    const defShip = shippingMethods.find(m => m.isDefault) || shippingMethods[0] || { fee: 0, packing: 0 };

    const itemSell = item.sellPrice ?? item.price ?? item.targetPrice ?? 0;
    const itemBuy  = item.buyPrice  ?? item.cost  ?? 0;
    const itemShip = item.shipping  ?? (defShip.fee + defShip.packing);

    // Try to find matching shipping value in dropdown options
    const matchShip = shippingMethods.find(m => m.fee + m.packing === itemShip);
    const initShip  = matchShip ? matchShip.fee + matchShip.packing : defShip.fee + defShip.packing;

    // Try to derive feePercent from stored fee/price ratio
    let initFee = item.feePercent ?? defPlat.fee;
    if (item.feePercent == null && itemSell > 0 && item.fee != null) {
        const derived = Math.round((Number(item.fee) / itemSell) * 1000) / 10;
        const mp = platforms.find(p => Math.abs(p.fee - derived) < 0.2);
        if (mp) initFee = mp.fee;
    }

    const [form, setForm] = useState({
        name:       item.name || item.itemName || '',
        shopName:   item.shopName  || '',
        buyPrice:   itemBuy,
        sellPrice:  itemSell,
        feePercent: initFee,
        shipping:   initShip,
        memo:       item.memo || '',
    });
    const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

    const feeAmt = Math.floor((Number(form.sellPrice)||0) * (Number(form.feePercent)||0) / 100);
    const profit = (Number(form.sellPrice)||0) - (Number(form.buyPrice)||0) - feeAmt - (Number(form.shipping)||0);
    const rate   = Number(form.sellPrice) > 0 ? ((profit / Number(form.sellPrice)) * 100).toFixed(1) : '0.0';

    const handleSave = () => {
        const sp = Number(form.sellPrice) || 0;
        const bp = Number(form.buyPrice)  || 0;
        const sh = Number(form.shipping)  || 0;
        onSave({
            ...item,
            name:           form.name,
            itemName:       form.name,
            shopName:       form.shopName,
            buyPrice:       bp,
            cost:           bp,
            sellPrice:      sp,
            price:          sp,
            targetPrice:    sp,
            feePercent:     Number(form.feePercent) || 0,
            fee:            feeAmt,
            shipping:       sh,
            profit,
            profitRate:     rate,
            expectedProfit: profit,
            memo:           form.memo,
        });
    };

    return (
        <div className="fixed inset-0 bg-black/50 z-[998] flex items-end sm:items-center justify-center p-4" onClick={onClose}>
            <div className="bg-white w-full max-w-md rounded-[2rem] p-6 shadow-2xl space-y-4" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center">
                    <h3 className="font-black text-base text-gray-800">{title}</h3>
                    <button onClick={onClose} className="p-2 text-gray-400 hover:text-gray-600 rounded-xl hover:bg-gray-100 transition-colors">
                        <Icon name="x" size={18} />
                    </button>
                </div>
                <div className="space-y-3">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] text-gray-400 font-bold ml-1">商品名</label>
                            <input className="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-100 outline-none text-sm"
                                value={form.name} onChange={e => set('name', e.target.value)} />
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] text-gray-400 font-bold ml-1">店舗名</label>
                            <input className="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-100 outline-none text-sm"
                                value={form.shopName} onChange={e => set('shopName', e.target.value)} />
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] text-gray-400 font-bold ml-1">仕入れ価格</label>
                            <input type="number" inputMode="numeric" className="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-100 outline-none text-sm"
                                value={form.buyPrice} onChange={e => set('buyPrice', e.target.value)} />
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] text-gray-400 font-bold ml-1">販売価格</label>
                            <input type="number" inputMode="numeric" className="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-100 outline-none text-sm"
                                value={form.sellPrice} onChange={e => set('sellPrice', e.target.value)} />
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] text-red-400 font-bold ml-1">販売先</label>
                            <select value={form.feePercent} onChange={e => set('feePercent', Number(e.target.value))}
                                className="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-100 outline-none text-sm">
                                {platforms.map(p => (
                                    <option key={p.id} value={p.fee}>{p.name} ({p.fee}%)</option>
                                ))}
                            </select>
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] text-blue-400 font-bold ml-1">発送方法</label>
                            <select value={form.shipping} onChange={e => set('shipping', Number(e.target.value))}
                                className="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-100 outline-none text-sm">
                                {shippingMethods.map(m => (
                                    <option key={m.id} value={m.fee + m.packing}>{m.name} (¥{(m.fee + m.packing).toLocaleString()})</option>
                                ))}
                            </select>
                        </div>
                    </div>
                    {showMemo && (
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] text-gray-400 font-bold ml-1">メモ</label>
                            <input className="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-100 outline-none text-sm"
                                value={form.memo} onChange={e => set('memo', e.target.value)} placeholder="任意" />
                        </div>
                    )}
                    <div className="bg-gray-50 rounded-xl p-3 flex justify-around text-center">
                        <div>
                            <p className="text-[9px] text-gray-400 font-bold">利益額</p>
                            <p className={`text-base font-black ${profit < 0 ? 'text-red-500' : 'text-green-600'}`}>¥{profit.toLocaleString()}</p>
                        </div>
                        <div>
                            <p className="text-[9px] text-gray-400 font-bold">利益率</p>
                            <p className={`text-base font-black ${Number(rate) < 0 ? 'text-red-500' : 'text-green-600'}`}>{rate}%</p>
                        </div>
                    </div>
                </div>
                <button onClick={handleSave}
                    className="w-full bg-blue-500 text-white font-black py-3.5 rounded-2xl hover:bg-blue-600 active:scale-[0.98] transition-all shadow-lg shadow-blue-100">
                    保存する
                </button>
            </div>
        </div>
    );
};

// ─── Settings Panel ───────────────────────────────────────────────────────────
const SettingsPanel = ({
    settings, onSave, historyCount, historyItems,
    darkMode, onToggleDark,
    shippingMethods, onUpdateShipping,
    platforms, onUpdatePlatforms,
    showToast,
}) => {
    const [form,         setForm]         = useState(settings);
    const [newShip,      setNewShip]      = useState({ name: '', fee: '', packing: '' });
    const [showShipList, setShowShipList] = useState(false);
    const [newPlat,      setNewPlat]      = useState({ name: '', fee: '' });
    const [showPlatList, setShowPlatList] = useState(false);
    const fileRef = useRef(null);

    const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

    // ── Shipping CRUD ─────────────────────────────────────────────────────────
    const addShipping = () => {
        if (!newShip.name.trim()) return;
        onUpdateShipping([...shippingMethods, {
            id: Date.now(), name: newShip.name.trim(),
            fee: Number(newShip.fee) || 0, packing: Number(newShip.packing) || 0, isDefault: false,
        }]);
        setNewShip({ name: '', fee: '', packing: '' });
        showToast({ message: '発送方法を追加しました', type: 'success' });
    };
    const removeShipping = id => onUpdateShipping(shippingMethods.filter(m => m.id !== id));
    const setDefaultShipping = id => onUpdateShipping(shippingMethods.map(m => ({ ...m, isDefault: m.id === id })));
    const moveShipping = (id, dir) => {
        const arr = [...shippingMethods];
        const i = arr.findIndex(m => m.id === id);
        if (dir === 'up'   && i > 0)               [arr[i-1], arr[i]] = [arr[i], arr[i-1]];
        if (dir === 'down' && i < arr.length - 1)  [arr[i], arr[i+1]] = [arr[i+1], arr[i]];
        onUpdateShipping(arr);
    };

    // ── Platform CRUD ─────────────────────────────────────────────────────────
    const addPlatform = () => {
        if (!newPlat.name.trim()) return;
        onUpdatePlatforms([...platforms, {
            id: Date.now(), name: newPlat.name.trim(), fee: Number(newPlat.fee) || 0, isDefault: false,
        }]);
        setNewPlat({ name: '', fee: '' });
        showToast({ message: '販路を追加しました', type: 'success' });
    };
    const removePlatform = id => onUpdatePlatforms(platforms.filter(p => p.id !== id));
    const setDefaultPlatform = id => onUpdatePlatforms(platforms.map(p => ({ ...p, isDefault: p.id === id })));
    const movePlatform = (id, dir) => {
        const arr = [...platforms];
        const i = arr.findIndex(p => p.id === id);
        if (dir === 'up'   && i > 0)              [arr[i-1], arr[i]] = [arr[i], arr[i-1]];
        if (dir === 'down' && i < arr.length - 1) [arr[i], arr[i+1]] = [arr[i+1], arr[i]];
        onUpdatePlatforms(arr);
    };

    // ── CSV export ────────────────────────────────────────────────────────────
    const exportCSV = () => {
        if (!historyItems.length) { showToast({ message: '履歴データがありません', type: 'error' }); return; }
        const hdr = ['日付','店舗名','商品名','販売価格','仕入原価','手数料','送料','利益額','利益率'];
        const rows = historyItems.map(item =>
            [item.date, item.shopName, item.itemName, item.price, item.cost, item.fee, item.shipping, item.profit, item.profitRate]
            .map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(',')
        );
        const csv  = '\uFEFF' + [hdr.join(','), ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a = Object.assign(document.createElement('a'), {
            href: url, download: `furimora_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'')}.csv`
        });
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast({ message: 'CSVを書き出しました', type: 'success' });
    };

    // ── Settings export / import ──────────────────────────────────────────────
    const exportSettings = () => {
        const data = { version: '1.3', settings: form, shippingMethods, platforms, exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a = Object.assign(document.createElement('a'), { href: url, download: 'furimora_settings.json' });
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast({ message: '設定データを書き出しました', type: 'success' });
    };
    const importSettings = e => {
        const file = e.target.files[0]; if (!file) return;
        new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = ev => res(ev.target.result);
            r.onerror = rej;
            r.readAsText(file);
        }).then(text => {
            const data = JSON.parse(text);
            if (data.settings)        { setForm(data.settings); onSave(data.settings); }
            if (data.shippingMethods) onUpdateShipping(data.shippingMethods);
            if (data.platforms)       onUpdatePlatforms(data.platforms);
            showToast({ message: '設定を読み込みました', type: 'success' });
        }).catch(() => showToast({ message: '設定ファイルが無効です', type: 'error' }));
        e.target.value = '';
    };

    // ── List row helper ───────────────────────────────────────────────────────
    const ListRow = ({ item, isDefault, onDefault, onUp, onDown, onRemove, sublabel, isFirst, isLast }) => (
        <div className={`flex items-center gap-2 p-3 rounded-xl border ${isDefault ? 'border-blue-400 bg-blue-500/10' : 'border-gray-100 bg-gray-50'}`}>
            <button onClick={onDefault}
                className={`w-5 h-5 rounded-full border-2 shrink-0 flex items-center justify-center transition-colors ${isDefault ? 'border-blue-500 bg-blue-500' : 'border-gray-300 hover:border-blue-300'}`}>
                {isDefault && <span className="w-2 h-2 bg-white rounded-full" />}
            </button>
            <div className="flex-1 min-w-0">
                <p className="text-xs font-black text-gray-800 truncate">{item.name}</p>
                <p className="text-[10px] text-gray-400">{sublabel}</p>
            </div>
            <div className="flex gap-0.5 shrink-0">
                <button onClick={onUp}   disabled={isFirst} className="p-1 text-gray-400 hover:text-blue-500 disabled:opacity-20 transition-colors"><Icon name="chevron-up"   size={13} /></button>
                <button onClick={onDown} disabled={isLast}  className="p-1 text-gray-400 hover:text-blue-500 disabled:opacity-20 transition-colors"><Icon name="chevron-down" size={13} /></button>
                <button onClick={onRemove}                  className="p-1 text-gray-400 hover:text-red-500 transition-colors"><Icon name="trash-2" size={13} /></button>
            </div>
        </div>
    );

    return (
        <>
            {/* Shipping management */}
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 className="font-black text-sm text-gray-700">発送方法の管理</h3>
                <input className="w-full p-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-100"
                    placeholder="配送名 (例: ネコポス)" value={newShip.name} onChange={e => setNewShip(p => ({ ...p, name: e.target.value }))} />
                <div className="grid grid-cols-2 gap-2">
                    <input type="number" inputMode="numeric" className="p-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-100"
                        placeholder="送料" value={newShip.fee} onChange={e => setNewShip(p => ({ ...p, fee: e.target.value }))} />
                    <input type="number" inputMode="numeric" className="p-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-100"
                        placeholder="梱包費" value={newShip.packing} onChange={e => setNewShip(p => ({ ...p, packing: e.target.value }))} />
                </div>
                <button onClick={addShipping} className="w-full bg-blue-500 text-white font-black py-2.5 rounded-xl hover:bg-blue-600 text-sm transition-all active:scale-[0.98]">
                    発送方法を追加
                </button>
                <button onClick={() => setShowShipList(p => !p)}
                    className="w-full flex justify-between items-center py-1.5 text-sm text-gray-500 font-bold hover:text-gray-700 transition-colors">
                    登録済みのリストを編集 <Icon name={showShipList ? 'chevron-up' : 'chevron-down'} size={16} />
                </button>
                {showShipList && (
                    <div className="space-y-2">
                        {shippingMethods.map((m, i) => (
                            <ListRow key={m.id} item={m}
                                isDefault={m.isDefault} isFirst={i === 0} isLast={i === shippingMethods.length - 1}
                                sublabel={`送料¥${m.fee}/梱包¥${m.packing}`}
                                onDefault={() => setDefaultShipping(m.id)}
                                onUp={() => moveShipping(m.id, 'up')} onDown={() => moveShipping(m.id, 'down')}
                                onRemove={() => removeShipping(m.id)} />
                        ))}
                    </div>
                )}
            </div>

            {/* Platform management */}
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 className="font-black text-sm text-gray-700">手数料（販路）の管理</h3>
                <input className="w-full p-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-100"
                    placeholder="販路名 (例: メルカリ)" value={newPlat.name} onChange={e => setNewPlat(p => ({ ...p, name: e.target.value }))} />
                <input type="number" inputMode="numeric" className="w-full p-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-100"
                    placeholder="手数料 (%)" value={newPlat.fee} onChange={e => setNewPlat(p => ({ ...p, fee: e.target.value }))} />
                <button onClick={addPlatform} className="w-full bg-red-500 text-white font-black py-2.5 rounded-xl hover:bg-red-600 text-sm transition-all active:scale-[0.98]">
                    販路を追加
                </button>
                <button onClick={() => setShowPlatList(p => !p)}
                    className="w-full flex justify-between items-center py-1.5 text-sm text-gray-500 font-bold hover:text-gray-700 transition-colors">
                    登録済みの手数料リスト <Icon name={showPlatList ? 'chevron-up' : 'chevron-down'} size={16} />
                </button>
                {showPlatList && (
                    <div className="space-y-2">
                        {platforms.map((p, i) => (
                            <ListRow key={p.id} item={p}
                                isDefault={p.isDefault} isFirst={i === 0} isLast={i === platforms.length - 1}
                                sublabel={`手数料: ${p.fee}%`}
                                onDefault={() => setDefaultPlatform(p.id)}
                                onUp={() => movePlatform(p.id, 'up')} onDown={() => movePlatform(p.id, 'down')}
                                onRemove={() => removePlatform(p.id)} />
                        ))}
                    </div>
                )}
            </div>

            {/* Basic settings */}
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-black text-sm mb-4 text-gray-700 flex items-center gap-2">
                    <Icon name="user" size={18} className="text-blue-500" /> 基本設定
                </h3>
                <div className="flex flex-col gap-1">
                    <label className="text-[10px] text-gray-400 font-bold ml-1">ユーザー名</label>
                    <input className="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-100 outline-none text-sm"
                        placeholder="名前を入力" value={form.userName} onChange={e => set('userName', e.target.value)} />
                </div>
            </div>

            <button onClick={() => onSave(form)} className="w-full bg-blue-500 text-white font-black py-4 rounded-2xl hover:bg-blue-600 active:scale-[0.98] transition-all shadow-lg shadow-blue-100">
                設定を保存
            </button>

            {/* Data management */}
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 className="font-black text-sm text-gray-700 flex items-center gap-2">
                    <Icon name="database" size={18} className="text-green-500" /> データ管理
                </h3>
                <button onClick={exportCSV}
                    className="w-full bg-green-500 text-white font-black py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-green-600 transition-all text-sm active:scale-[0.98]">
                    <Icon name="file-text" size={16} /> 履歴データをCSVとして書き出す
                </button>
                <button onClick={exportSettings}
                    className="w-full bg-purple-500 text-white font-black py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-purple-600 transition-all text-sm active:scale-[0.98]">
                    <Icon name="download" size={16} /> 設定データを書き出す
                </button>
                <label className="w-full bg-orange-500 text-white font-black py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-orange-600 transition-all text-sm active:scale-[0.98] cursor-pointer">
                    <Icon name="upload" size={16} /> 設定データを読み込む
                    <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={importSettings} />
                </label>
            </div>

            {/* App info */}
            <div className="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                <h3 className="font-black text-sm mb-3 text-gray-500 flex items-center gap-2">
                    <Icon name="info" size={16} className="text-gray-400" /> アプリ情報
                </h3>
                <div className="space-y-2 text-[11px] text-gray-500">
                    <div className="flex justify-between"><span className="font-bold">バージョン</span><span>1.3.0</span></div>
                    <div className="flex justify-between"><span className="font-bold">総取引件数</span><span>{historyCount}件</span></div>
                    <div className="flex justify-between"><span className="font-bold">バックエンド</span><span>Google Apps Script</span></div>
                </div>
            </div>
        </>
    );
};

// ─── Main App ─────────────────────────────────────────────────────────────────
const App = () => {
    const [activeTab,    setActiveTab]    = useState('calc');
    const [calcSubTab,   setCalcSubTab]   = useState('calculator');
    const [histSubTab,   setHistSubTab]   = useState('list');
    const [toast,        setToast]        = useState(null);

    // ── Display / master data state ───────────────────────────────────────────
    const [darkMode,         setDarkMode]         = useState(() => ls.get('darkMode', false));
    const [shippingMethods,  setShippingMethods]  = useState(() => ls.get('furimora_shipping',  DEFAULT_SHIPPING));
    const [platforms,        setPlatforms]        = useState(() => ls.get('furimora_platforms', DEFAULT_PLATFORMS));

    useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
    }, [darkMode]);

    // ── Calculator state ──────────────────────────────────────────────────────
    const [shopName,   setShopName]   = useState('');
    const [itemName,   setItemName]   = useState('');
    const [price,      setPrice]      = useState('');
    const [cost,       setCost]       = useState('');
    const [feePercent, setFeePercent] = useState(() => {
        const list = ls.get('furimora_platforms', DEFAULT_PLATFORMS);
        const def  = list.find(p => p.isDefault);
        return def ? def.fee : 10;
    });
    const [shipping, setShipping] = useState(() => {
        const list = ls.get('furimora_shipping', DEFAULT_SHIPPING);
        const def  = list.find(m => m.isDefault);
        return def ? def.fee + def.packing : 239;
    });

    // ── History state ─────────────────────────────────────────────────────────
    const [historyItems, setHistoryItems] = useState([]);
    const [isSaving,     setIsSaving]     = useState(false);
    const [isLoading,    setIsLoading]    = useState(false);
    const [editingItem,  setEditingItem]  = useState(null);

    // ── Inventory state (localStorage) ────────────────────────────────────────
    const [inventory,        setInventory]        = useState(() => ls.get('furimora_inventory', []));
    const [invForm,          setInvForm]          = useState({ name: '', buyPrice: '', targetPrice: '', shopName: '', memo: '' });
    const [editingInvItem,   setEditingInvItem]   = useState(null);
    const [editingStockItem, setEditingStockItem] = useState(null);

    // ── Stock state (from history, unlisted items) ─────────────────────────────
    const [stock,             setStock]             = useState(() => ls.get('furimora_stock', []));
    const [invSubTab,         setInvSubTab]         = useState('stock');
    const [stockSearch,       setStockSearch]       = useState('');
    const [stockStatusFilter, setStockStatusFilter] = useState('all');
    const [stockSort,         setStockSort]         = useState('newest');

    // ── Settings state ────────────────────────────────────────────────────────
    const [settings, setSettings] = useState(() => ({
        defaultFee:      ls.get('defaultFee', 10),
        defaultShipping: ls.get('defaultShipping', 239),
        userName:        ls.get('userName', ''),
    }));

    // ── Computed profit ───────────────────────────────────────────────────────
    const priceNum = Number(price)  || 0;
    const costNum  = Number(cost)   || 0;
    const fee      = Math.floor(priceNum * (feePercent / 100));
    const profit   = priceNum - costNum - fee - shipping;
    const profitRate = priceNum > 0 ? ((profit / priceNum) * 100).toFixed(1) : '0.0';

    // ── Stats derived from historyItems ───────────────────────────────────────
    const stats = useMemo(() => {
        const now  = new Date();
        const todayKey = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
        const monKey   = `${now.getFullYear()}/${now.getMonth() + 1}`;

        let today = 0, month = 0, totalSales = 0;
        const shopMap  = {};
        const monthMap = {};

        historyItems.forEach(item => {
            if (!item.date) return;
            // Support formats: "2025/3/25 10:00:00" and "2025-03-25T..."
            const raw = String(item.date).replace(/\//g, '-').split(' ')[0];
            const d = new Date(raw);
            if (isNaN(d)) return;
            const dk = `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
            const mk = `${d.getFullYear()}/${d.getMonth() + 1}`;
            const p = Number(item.profit) || 0;
            const pr = Number(item.price)  || 0;

            if (dk === todayKey) today += p;
            if (mk === monKey)   month += p;
            totalSales += pr;

            const shop = item.shopName || '不明';
            shopMap[shop]  = (shopMap[shop]  || 0) + p;
            monthMap[mk]   = (monthMap[mk]   || 0) + p;
        });

        const totalProfit  = historyItems.reduce((s, i) => s + (Number(i.profit) || 0), 0);
        const avgProfitRate = totalSales > 0 ? ((totalProfit / totalSales) * 100).toFixed(1) : '0.0';

        // Last 6 months
        const last6 = Array.from({ length: 6 }, (_, i) => {
            const d = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
            const k = `${d.getFullYear()}/${d.getMonth() + 1}`;
            return { label: `${d.getMonth() + 1}月`, value: monthMap[k] || 0 };
        });

        return { today, month, totalProfit, totalSales, avgProfitRate, shopMap, last6 };
    }, [historyItems]);

    // ── GAS helpers ────────────────────────────────────────────────────────────
    const gasPost = (action, payload) => {
        fetch(GAS_URL, {
            method: 'POST',
            mode:   'no-cors',
            body:   JSON.stringify({ action, ...payload }),
        }).catch(err => console.error(`GAS POST [${action}] 失敗:`, err));
    };

    // ── Fetch from GAS ─────────────────────────────────────────────────────────
    const fetchHistory = useCallback(async () => {
        setIsLoading(true);
        try {
            const res  = await fetch(`${GAS_URL}?t=${Date.now()}`);
            const data = await res.json();
            if (Array.isArray(data)) setHistoryItems(data);
        } catch (err) {
            console.error('履歴取得失敗:', err);
        } finally {
            setIsLoading(false);
        }
    }, []);

    const fetchInventory = useCallback(async () => {
        try {
            const res  = await fetch(`${GAS_URL}?type=inventory&t=${Date.now()}`);
            const data = await res.json();
            if (Array.isArray(data) && data.length > 0) {
                setInventory(data);
                ls.set('furimora_inventory', data);
            }
        } catch (err) {
            console.error('ストック取得失敗:', err);
        }
    }, []);

    const fetchStock = useCallback(async () => {
        try {
            const res  = await fetch(`${GAS_URL}?type=stock&t=${Date.now()}`);
            const data = await res.json();
            if (Array.isArray(data) && data.length > 0) {
                setStock(data);
                ls.set('furimora_stock', data);
            }
        } catch (err) {
            console.error('在庫取得失敗:', err);
        }
    }, []);

    useEffect(() => { fetchHistory(); fetchInventory(); fetchStock(); }, []);
    useEffect(() => { if (activeTab === 'history') fetchHistory(); }, [activeTab]);

    // ── Save (Optimistic) ──────────────────────────────────────────────────────
    const saveToGas = async () => {
        if (!itemName.trim()) { setToast({ message: '商品名を入力してください', type: 'error' }); return; }
        setIsSaving(true);

        const now     = new Date();
        const newItem = {
            date: now.toLocaleString('ja-JP'),
            shopName: shopName.trim(),
            itemName: itemName.trim(),
            price: priceNum,
            cost:  costNum,
            fee,
            shipping,
            profit,
            profitRate,
            _pending: true,
            _uid: now.getTime(),
        };

        // 1. Optimistic: immediately show in UI
        setHistoryItems(prev => [newItem, ...prev]);
        setToast({ message: '保存しました！', type: 'success' });

        // 2. Reset form
        setShopName(''); setItemName(''); setPrice(''); setCost('');
        setIsSaving(false);

        // 3. Background POST to GAS (no-cors → can't read response)
        fetch(GAS_URL, {
            method: 'POST',
            mode:   'no-cors',
            body:   JSON.stringify({ action: 'saveHistory', ...newItem }),
        }).catch(err => console.error('GAS POST失敗:', err));

        // 4. Re-fetch after GAS has time to process
        setTimeout(fetchHistory, 2500);
    };

    // ── Inventory helpers ──────────────────────────────────────────────────────
    const persistInventory = list => { setInventory(list); ls.set('furimora_inventory', list); };

    const addInventoryItem = () => {
        if (!invForm.name.trim()) return;
        const bp = Number(invForm.buyPrice)    || 0;
        const tp = Number(invForm.targetPrice) || 0;
        const ef = Math.floor(tp * (settings.defaultFee / 100));
        const item = {
            ...invForm,
            id: Date.now(),
            addedAt:        new Date().toLocaleDateString('ja-JP'),
            buyPrice:       bp,
            targetPrice:    tp,
            expectedProfit: tp - bp - ef - settings.defaultShipping,
        };
        persistInventory([item, ...inventory]);
        gasPost('upsertInventory', { item });
        setInvForm({ name: '', buyPrice: '', targetPrice: '', shopName: '', memo: '' });
        setToast({ message: 'ストックに追加しました', type: 'success' });
    };

    const removeInventory = id => {
        persistInventory(inventory.filter(i => i.id !== id));
        gasPost('deleteInventory', { id });
    };

    const updateInvItem = item => {
        persistInventory(inventory.map(i => i.id === item.id ? item : i));
        gasPost('upsertInventory', { item });
        setEditingInvItem(null);
        setToast({ message: '更新しました', type: 'success' });
    };

    const moveInvToStock = item => {
        const tp = Number(item.targetPrice) || 0;
        const bp = Number(item.buyPrice)    || 0;
        const ep = tp - bp;
        const newStock = {
            id:         Date.now(),
            name:       item.name || '名称未定',
            shopName:   item.shopName || '',
            buyPrice:   bp,
            sellPrice:  tp,
            profit:     ep,
            profitRate: tp > 0 ? ((ep / tp) * 100).toFixed(1) : '0.0',
            status:     '出品前',
            addedAt:    new Date().toLocaleDateString('ja-JP'),
            pinned:     false,
        };
        persistStock([newStock, ...stock]);
        gasPost('upsertStock', { item: newStock });
        removeInventory(item.id);
        setInvSubTab('stock');
        setToast({ message: '在庫へ移動しました', type: 'success' });
    };

    const soldInventory = item => {
        setCost(item.buyPrice); setPrice(item.targetPrice);
        setShopName(item.shopName); setItemName(item.name);
        removeInventory(item.id);
        setActiveTab('calc'); setCalcSubTab('calculator');
        setToast({ message: '計算画面に転記しました', type: 'success' });
    };

    // ── Master data helpers ────────────────────────────────────────────────────
    const toggleDarkMode = () => {
        const v = !darkMode;
        setDarkMode(v);
        ls.set('darkMode', v);
    };

    const updateShippingMethods = list => {
        setShippingMethods(list);
        ls.set('furimora_shipping', list);
        const def = list.find(m => m.isDefault);
        if (def) setShipping(def.fee + def.packing);
    };

    const updatePlatforms = list => {
        setPlatforms(list);
        ls.set('furimora_platforms', list);
        const def = list.find(p => p.isDefault);
        if (def) setFeePercent(def.fee);
    };

    // ── Stock helpers ─────────────────────────────────────────────────────────
    const persistStock = list => { setStock(list); ls.set('furimora_stock', list); };

    const addHistoryToStock = item => {
        const newItem = {
            id:         Date.now(),
            name:       item.itemName || '名称未定',
            shopName:   item.shopName || '',
            buyPrice:   Number(item.cost)       || 0,
            sellPrice:  Number(item.price)      || 0,
            profit:     Number(item.profit)     || 0,
            profitRate: item.profitRate         || '0.0',
            status:     '出品前',
            addedAt:    new Date().toLocaleDateString('ja-JP'),
            pinned:     false,
        };
        persistStock([newItem, ...stock]);
        gasPost('upsertStock', { item: newItem });
        setToast({ message: 'ストックに追加しました', type: 'success' });
    };

    const removeStock = id => {
        persistStock(stock.filter(i => i.id !== id));
        gasPost('deleteStock', { id });
    };

    const updateStockItem = item => {
        persistStock(stock.map(i => i.id === item.id ? item : i));
        gasPost('upsertStock', { item });
    };

    // ── History item actions ──────────────────────────────────────────────────
    const addHistoryToInventory = item => {
        const tp = Number(item.price) || 0;
        const bp = Number(item.cost)  || 0;
        const ef = Math.floor(tp * (settings.defaultFee / 100));
        const newInv = {
            id:             Date.now(),
            name:           item.itemName || '名称未定',
            shopName:       item.shopName || '',
            buyPrice:       bp,
            targetPrice:    tp,
            addedAt:        new Date().toLocaleDateString('ja-JP'),
            memo:           '',
            expectedProfit: tp - bp - ef - settings.defaultShipping,
        };
        persistInventory([newInv, ...inventory]);
        gasPost('upsertInventory', { item: newInv });
        setToast({ message: 'ストックに追加しました', type: 'success' });
    };

    const deleteHistoryItem = itemKey => {
        setHistoryItems(prev => prev.filter(i => (i._uid || i.date + i.itemName) !== itemKey));
        setToast({ message: '削除しました', type: 'success' });
    };

    const updateHistoryItem = updated => {
        setHistoryItems(prev => prev.map(i =>
            (i._uid || i.date + i.itemName) === (updated._uid || updated.date + updated.itemName) ? updated : i
        ));
        setEditingItem(null);
        setToast({ message: '更新しました', type: 'success' });
    };

    // ── Settings save ─────────────────────────────────────────────────────────
    const saveSettings = s => {
        setSettings(s);
        ls.set('defaultFee',      s.defaultFee);
        ls.set('defaultShipping', s.defaultShipping);
        ls.set('userName',        s.userName);
        setFeePercent(s.defaultFee);
        setShipping(s.defaultShipping);
        setToast({ message: '設定を保存しました', type: 'success' });
    };

    // ── Tab button ────────────────────────────────────────────────────────────
    const TabBtn = ({ id, icon, label }) => (
        <button onClick={() => setActiveTab(id)}
            className={`flex flex-col items-center justify-center flex-1 py-3 transition-colors ${activeTab === id ? 'text-blue-500' : 'text-gray-400 hover:text-gray-600'}`}>
            <Icon name={icon} size={22} />
            <span className="text-[10px] mt-1 font-bold">{label}</span>
        </button>
    );

    // ─────────────────────────────────────────────────────────────────────────
    return (
        <div className="flex flex-col h-dvh bg-gray-50 relative">
            {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

            {/* Header */}
            <header className="bg-white border-b border-gray-100 py-4 px-6 shrink-0 flex justify-between items-center">
                <h1 className="text-xl font-black text-gray-800 tracking-tighter">Furimora</h1>
                <div className="flex items-center gap-1">
                    {isLoading && <div className="w-2 h-2 bg-blue-400 rounded-full animate-pulse mr-1" title="同期中" />}
                    <button onClick={() => setToast({ message: '準備中です', type: 'error' })}
                        className="p-2 text-gray-400 hover:text-indigo-500 rounded-xl hover:bg-gray-100 transition-colors" title="取扱説明書">
                        <Icon name="book-open" size={18} />
                    </button>
                    <button onClick={toggleDarkMode}
                        className="p-2 text-gray-400 hover:text-blue-500 rounded-xl hover:bg-gray-100 transition-colors" title="ダークモード">
                        <Icon name={darkMode ? 'sun' : 'moon'} size={18} />
                    </button>
                    <button onClick={() => setToast({ message: '準備中です', type: 'error' })}
                        className="text-[10px] font-bold text-gray-300 px-2 py-1 border border-gray-100 rounded-lg hover:border-gray-300 hover:text-gray-400 transition-colors ml-1">
                        PRO
                    </button>
                </div>
            </header>

            {/* Scrollable content */}
            <div className="flex-1 overflow-y-auto px-4 sm:px-8 pt-6 pb-28">

                {/* ══ CALC ══════════════════════════════════════════════════════ */}
                {activeTab === 'calc' && (
                    <div className="fade-in max-w-2xl mx-auto w-full">
                        <div className="flex bg-gray-200 rounded-lg p-1 mb-6">
                            {[['calculator','計算'],['research','リサーチ']].map(([id, label]) => (
                                <button key={id} onClick={() => setCalcSubTab(id)}
                                    className={`flex-1 py-2 text-sm font-black rounded-md transition-all ${calcSubTab === id ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>
                                    {label}

                                    // pinned first
                                    items.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

                                    if (items.length === 0) return (
                                        <div className="py-16 text-center">
                                            <Icon name="inbox" size={40} className="text-gray-200 mx-auto mb-3" />
                                            <p className="text-gray-400 font-bold text-sm">
                                                {stock.length === 0 ? '履歴の → ボタンで追加できます' : '条件に一致するストックがありません'}
                                            </p>
                                        </div>
                                    );

                                    return items.map(item => {
                                        const statusColor = STATUS_COLORS[item.status] || 'bg-gray-100 text-gray-400';
                                        const profitNum   = Number(item.profit) || 0;
                                        return (
                                            <div key={item.id}
                                                className={`bg-white p-4 rounded-2xl shadow-sm border transition-colors ${item.pinned ? 'border-yellow-300' : 'border-gray-100 hover:border-blue-200'}`}>
                                                <div className="flex justify-between items-start gap-2">
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-center gap-2 flex-wrap">
                                                            <h3 className="font-black text-sm text-gray-800 truncate">{item.name}</h3>
                                                            <span className={`text-[9px] font-black px-2 py-0.5 rounded-full shrink-0 ${statusColor}`}>{item.status}</span>
                                                        </div>
                                                        <p className="text-[10px] text-gray-400 mt-0.5">{item.shopName || '—'} · {item.addedAt}</p>
                                                    </div>
                                                    <div className="flex items-center gap-0.5 shrink-0">
                                                        <button onClick={() => updateStockItem({ ...item, pinned: !item.pinned })}
                                                            className={`p-1.5 rounded-lg transition-colors ${item.pinned ? 'text-yellow-500 hover:text-yellow-600 bg-yellow-50' : 'text-gray-300 hover:text-yellow-500 hover:bg-yellow-50'}`}
                                                            title="スタック（固定表示）">
                                                            <Icon name="star" size={13} />
                                                        </button>
                                                        <button onClick={() => setEditingStockItem(item)}
                                                            className="p-1.5 text-gray-400 hover:text-blue-500 rounded-lg hover:bg-gray-100 transition-colors" title="編集">
                                                            <Icon name="pencil" size={13} />
                                                        </button>
                                                        <button onClick={() => removeStock(item.id)}
                                                            className="p-1.5 text-gray-400 hover:text-red-500 rounded-lg hover:bg-gray-100 transition-colors">
                                                            <Icon name="trash-2" size={13} />
                                                        </button>
                                                    </div>
                                                </div>
                                                <div className="mt-3 pt-2 border-t border-gray-50 flex justify-between items-center gap-2">
                                                    <div className="flex gap-2 text-[10px] font-bold shrink-0">
                                                        <span className="text-gray-400">仕入 ¥{(Number(item.buyPrice) || 0).toLocaleString()}</span>
                                                        <span className="text-gray-300">→</span>
                                                        <span className={profitNum >= 0 ? 'text-green-600' : 'text-red-500'}>
                                                            ¥{profitNum.toLocaleString()} ({item.profitRate}%)
                                                        </span>
                                                    </div>
                                                    <select value={item.status}
                                                        onChange={e => updateStockItem({ ...item, status: e.target.value })}
                                                        className="text-[11px] font-bold border border-gray-200 rounded-lg px-2 py-1 bg-gray-50 outline-none focus:ring-1 focus:ring-blue-100 shrink-0">
                                                        {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        );
                                    });
                                })()}
                            </div>
                        )}
                    </div>
                )}

                {/* ══ SETTINGS ══════════════════════════════════════════════════ */}
                {activeTab === 'settings' && (
                    <div className="fade-in max-w-2xl mx-auto w-full space-y-6">
                        <SettingsPanel
                            settings={settings} onSave={saveSettings} historyCount={historyItems.length}
                            historyItems={historyItems}
                            darkMode={darkMode} onToggleDark={toggleDarkMode}
                            shippingMethods={shippingMethods} onUpdateShipping={updateShippingMethods}
                            platforms={platforms} onUpdatePlatforms={updatePlatforms}
                            showToast={setToast}
                        />
                    </div>
                )}
            </div>

            {/* Edit Modals (unified) */}
            {editingItem      && <UnifiedEditModal title="履歴を編集"       item={editingItem}      onSave={updateHistoryItem}                   onClose={() => setEditingItem(null)}      platforms={platforms} shippingMethods={shippingMethods} />}
            {editingInvItem   && <UnifiedEditModal title="仕入れ候補を編集" item={editingInvItem}   onSave={updateInvItem}                        onClose={() => setEditingInvItem(null)}   platforms={platforms} shippingMethods={shippingMethods} showMemo />}
            {editingStockItem && <UnifiedEditModal title="在庫を編集"       item={editingStockItem} onSave={i => { updateStockItem(i); setEditingStockItem(null); setToast({ message: '更新しました', type: 'success' }); }} onClose={() => setEditingStockItem(null)} platforms={platforms} shippingMethods={shippingMethods} />}

            {/* Tab bar */}
            <nav className="fixed bottom-0 left-0 right-0 flex justify-center pointer-events-none z-50">
                <div className="w-full max-w-4xl bg-white/90 backdrop-blur-md border-t border-gray-100 flex items-center px-4 pb-2 shrink-0 shadow-[0_-4px_12px_-2px_rgba(0,0,0,0.08)] pointer-events-auto h-20">
                    <TabBtn id="calc"      icon="calculator" label="計算" />
                    <TabBtn id="history"   icon="history"    label="履歴" />
                    <TabBtn id="inventory" icon="package"    label="在庫" />
                    <TabBtn id="settings"  icon="settings"   label="設定" />
                </div>
            </nav>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
